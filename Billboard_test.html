<script>
(function() {
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT9aXB9z9jcsaA0U-LsuV4nIHwIIw2huGB8zaalh7It4GQP_DWFFdQ4Utaw_ajkdhx5ydn87BcfS82d/pub?output=csv";
    const displayInterval = 12000; 
    let currentAdIndex = 0;
    let adSlideElements = [];
    let lastWeatherData = null; 
    let targetTimeZone = Intl.DateTimeFormat().resolvedOptions().timeZone; 
    let isNightTimeSolar = null; 
    let interactionTimer;
    let currentImageUrls = [];
    let currentQuarterTracker = null; // Used to track 15-min intervals

    window.handleInteraction = function() {
        const backBtn = document.getElementById('ghost-back-btn');
        const fsBtn = document.getElementById('fullscreen-toggle-btn');
        if(backBtn) backBtn.classList.add('active');
        if(fsBtn) fsBtn.classList.add('active');
        clearTimeout(interactionTimer);
        interactionTimer = setTimeout(() => { 
            if(backBtn) backBtn.classList.remove('active'); 
            if(fsBtn) fsBtn.classList.remove('active'); 
        }, 3000);
    }

    window.toggleFullScreen = function() {
        const root = document.documentElement;
        if (!document.fullscreenElement) { 
            if (root.requestFullscreen) root.requestFullscreen();
            else if (root.webkitRequestFullscreen) root.webkitRequestFullscreen();
            else if (root.msRequestFullscreen) root.msRequestFullscreen();
        } else { 
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            else if (document.msExitFullscreen) document.msExitFullscreen();
        }
    };

    ['fullscreenchange', 'webkitfullscreenchange', 'mozfullscreenchange', 'MSFullscreenChange'].forEach(
        evt => document.addEventListener(evt, updateFsIcon)
    );

    function updateFsIcon() {
        const fsIcon = document.getElementById('fs-icon');
        const fsText = document.querySelector('#fullscreen-toggle-btn span');
        if (document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement) {
            if(fsIcon) fsIcon.setAttribute('data-lucide', 'minimize');
            if(fsText) fsText.innerText = "Exit Full Screen";
        } else {
            if(fsIcon) fsIcon.setAttribute('data-lucide', 'maximize');
            if(fsText) fsText.innerText = "Full Screen";
        }
        if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function syncTimeTheme() {
        const root = document.getElementById('sk-billboard-root-container');
        if (!root) return;
        let isNightTime = (isNightTimeSolar !== null) ? isNightTimeSolar : (new Date().getHours() < 6 || new Date().getHours() >= 19);
        if (isNightTime) {
            root.classList.add('dark-mode');
            root.classList.remove('light-mode');
        } else {
            root.classList.add('light-mode');
            root.classList.remove('dark-mode');
        }
        if(lastWeatherData) updateWeatherUI(lastWeatherData);
    }

    async function fetchAdImages(isAutoSync = false) {
        try {
            const res = await fetch(`${CSV_URL}&t=${Date.now()}`);
            const text = await res.text();
            const lines = text.split(/\r?\n/);
            let loadedUrls = [];
            lines.forEach((line, idx) => {
                if (idx === 0) return; 
                const cellMatch = line.match(/(".*?"|[^,]+)/g);
                if (cellMatch && cellMatch[2]) {
                    let url = cellMatch[2].replace(/^"|"$|&amp;/g, '').trim();
                    if (url.startsWith('http')) loadedUrls.push(url);
                }
            });
            if (loadedUrls.length > 0 && JSON.stringify(loadedUrls) !== JSON.stringify(currentImageUrls)) {
                currentImageUrls = loadedUrls;
                renderSlides();
            }
        } catch (e) { console.warn("Billboard Sync Engine: fetch failed."); }
    }

    function renderSlides() {
        const viewport = document.getElementById('sk-ad-viewport');
        if(!viewport) return;
        viewport.innerHTML = '';
        adSlideElements = [];
        currentAdIndex = 0;
        currentImageUrls.forEach((url, idx) => {
            const slide = document.createElement('div');
            slide.className = `sk-ad-slide ${idx === 0 ? 'active' : ''}`;
            const image = document.createElement('img');
            image.src = url;
            slide.appendChild(image);
            viewport.appendChild(slide);
            adSlideElements.push(slide);
        });
    }

    async function fetchWeather(lat, lon) {
        try {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,is_day&temperature_unit=fahrenheit&timezone=auto`;
            const res = await fetch(url);
            const data = await res.json();
            if (data.timezone) targetTimeZone = data.timezone;
            if (data.current.is_day !== undefined) isNightTimeSolar = (data.current.is_day === 0);
            const weatherData = { temp: Math.round(data.current.temperature_2m), realfeel: Math.round(data.current.apparent_temperature) };
            lastWeatherData = weatherData; 
            return weatherData;
        } catch(e) { return null; }
    }

    function updateWeatherUI(weather) {
        if(!weather) return;
        const tempDisplay = document.getElementById('sk-temp-val');
        if(tempDisplay) {
            tempDisplay.innerText = `${weather.temp}°`;
            let tempColor = "#ffffff";
            const t = weather.temp;
            if (t <= 32) tempColor = "#00f2ff"; 
            else if (t <= 50) tempColor = "#0ea5e9"; 
            else if (t <= 75) tempColor = "#FAC429"; 
            else if (t <= 90) tempColor = "#f97316"; 
            else tempColor = "#ef4444"; 
            tempDisplay.style.color = tempColor;
        }
    }

    function rotateAds() {
        if(adSlideElements.length === 0) return;
        adSlideElements[currentAdIndex].classList.remove('active');
        currentAdIndex = (currentAdIndex + 1) % adSlideElements.length;
        adSlideElements[currentAdIndex].classList.add('active');
    }

    // V4.23: Elegant Fade-Out / Fade-In Swap Logic
    function updateQuarterlySwap(quarter) {
        const logoGroup = document.querySelector('.sk-logo-group');
        const phoneDiv = document.querySelector('.sk-bottom-phone');
        if (!logoGroup || !phoneDiv) return;

        // 1. Fade Elements Out
        logoGroup.style.opacity = '0';
        phoneDiv.style.opacity = '0';
        
        // 2. Wait for fade, then physically swap DOM layout order
        setTimeout(() => {
            if (quarter % 2 === 0) {
                // Even Quarter (0-14 mins, 30-44 mins) -> Image Left, Phone Center
                logoGroup.style.order = '1';
                logoGroup.style.justifyContent = 'flex-start'; // Align back to left edge
                
                phoneDiv.style.order = '2';
                phoneDiv.style.justifyContent = 'center'; // Align to center
            } else {
                // Odd Quarter (15-29 mins, 45-59 mins) -> Phone Left, Image Center
                phoneDiv.style.order = '1';
                phoneDiv.style.justifyContent = 'flex-start'; // Align back to left edge
                
                logoGroup.style.order = '2';
                logoGroup.style.justifyContent = 'center'; // Align to center
            }
            
            // 3. Fade Elements Back In
            logoGroup.style.opacity = '1';
            phoneDiv.style.opacity = '1';
        }, 500); // Matches the CSS transition duration
    }

    function updateLocalTime() {
        const timeEl = document.getElementById('sk-time-val');
        if(!timeEl) return;
        
        let currentMin = new Date().getMinutes();

        try {
            const timeString = new Date().toLocaleTimeString('en-US', { timeZone: targetTimeZone, hour: '2-digit', minute:'2-digit', hour12: true });
            timeEl.innerText = timeString;
            
            // Derive accurately adjusted minute based on targetTimeZone
            const tzDate = new Date(new Date().toLocaleString('en-US', { timeZone: targetTimeZone }));
            currentMin = tzDate.getMinutes();
        } catch (e) {
            timeEl.innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: true});
        }

        // Calculate current 15-minute chunk (0, 1, 2, or 3)
        let currentQuarter = Math.floor(currentMin / 15);

        // Trigger 15-minute fade-swap
        if (currentQuarterTracker !== currentQuarter) {
            // Check if it's the very first load to avoid a random fade in on boot
            const isInitialLoad = (currentQuarterTracker === null);
            currentQuarterTracker = currentQuarter;
            
            if(isInitialLoad) {
                // Instantly apply layout without animation delay on boot
                const logoGroup = document.querySelector('.sk-logo-group');
                const phoneDiv = document.querySelector('.sk-bottom-phone');
                if (logoGroup && phoneDiv) {
                    if (currentQuarter % 2 === 0) {
                        logoGroup.style.order = '1'; logoGroup.style.justifyContent = 'flex-start';
                        phoneDiv.style.order = '2'; phoneDiv.style.justifyContent = 'center';
                    } else {
                        phoneDiv.style.order = '1'; phoneDiv.style.justifyContent = 'flex-start';
                        logoGroup.style.order = '2'; logoGroup.style.justifyContent = 'center';
                    }
                }
            } else {
                updateQuarterlySwap(currentQuarter);
            }
        }
    }

    async function startBillboard() {
        if (typeof lucide !== 'undefined') lucide.createIcons();
        syncTimeTheme();
        await fetchAdImages();
        
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
                async (p) => { updateWeatherUI(await fetchWeather(p.coords.latitude, p.coords.longitude)); syncTimeTheme(); },
                async (e) => { updateWeatherUI(await fetchWeather(39.1243, -88.5525)); syncTimeTheme(); },
                { timeout: 5000 }
            );
        } else {
            fetchWeather(39.1243, -88.5525).then(w => { updateWeatherUI(w); syncTimeTheme(); });
        }
        
        updateLocalTime(); // Run immediately so things get placed properly before interval fires
        
        setTimeout(() => { setInterval(updateLocalTime, 1000); }, 500);
        setInterval(rotateAds, displayInterval);
        setInterval(syncTimeTheme, 300000); 
        setInterval(() => fetchAdImages(true), 60000);
    }

    if (document.readyState === "complete" || document.readyState === "interactive") startBillboard();
    else document.addEventListener("DOMContentLoaded", startBillboard);
})();
</script>
