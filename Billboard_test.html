<!-- Framework Assets scoped for the Widget -->
<script src="https://cdn.tailwindcss.com?v=3.0"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<div id="sk-billboard-root-container" class="light-mode" onmousemove="handleInteraction()" ontouchstart="handleInteraction()">
    
    <!-- Mobile Landscape Lock Overlay -->
    <div id="landscape-lock">
        <div class="lock-content">
            <i data-lucide="rotate-cw" class="w-16 h-16 mb-4 animate-bounce"></i>
            <p>Please Rotate Your Device<br><span class="text-sm opacity-60 uppercase font-bold tracking-widest">Landscape Mode Required</span></p>
        </div>
    </div>

    <!-- Interactive Ghost Back Button -->
    <a href="./index.html" id="ghost-back-btn">
        <i data-lucide="arrow-left" class="w-5 h-5"></i>
        <span>Back to Site</span>
    </a>

    <div id="sk-billboard-display">
        
        <!-- Ad Stage: The Main Part -->
        <div id="sk-ad-viewport">
            <!-- Images injected via JavaScript & CSV -->
        </div>

        <!-- Hugging Bottom Bar: Branding, Weather, & Time -->
        <div id="sk-bottom-bar">
            <div class="sk-logo-group">
                <div class="sk-logo">S & K VENTURES</div>
                <div class="sk-bottom-phone">844-907-4450</div>
            </div>
            
            <div class="sk-info-stack">
                <div class="sk-weather">
                    <div id="sk-temp-val">--°</div>
                    <div id="sk-realfeel-val">REALFEEL --°</div>
                </div>
                <div id="sk-time-val">00:00</div>
            </div>
        </div>

        <!-- LED Texture Overlay & Hardware Vignette -->
        <div class="sk-led-overlay"></div>
    </div>
</div>

<style>
    /* THEME VARIABLES */
    #sk-billboard-root-container {
        --bb-bottom-bg: rgba(255, 255, 255, 1);
        --bb-text: #111111;
        --bb-border: rgba(0, 0, 0, 0.1);
        --bar-height: 100px;
        
        all: initial !important;
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
        width: 100vw !important;
        height: 100vh !important;
        margin: 0 !important;
        padding: 0 !important;
        background: #111 !important; /* Dark environment background */
        font-family: 'Arial Black', Gadget, sans-serif !important;
        box-sizing: border-box !important;
        position: relative !important;
        overflow: hidden !important;
        z-index: 1 !important;
    }

    #sk-billboard-root-container.dark-mode {
        --bb-bottom-bg: rgba(20, 20, 20, 0.98);
        --bb-text: #ffffff;
        --bb-border: rgba(255, 255, 255, 0.1);
    }

    /* GHOST BACK BUTTON */
    #ghost-back-btn {
        position: fixed !important;
        top: 30px !important;
        left: 30px !important;
        z-index: 2000 !important;
        background: rgba(0, 0, 0, 0.8) !important;
        color: #FFC627 !important;
        padding: 12px 24px !important;
        border-radius: 50px !important;
        border: 2px solid #FFC627 !important;
        display: flex !important;
        align-items: center !important;
        gap: 10px !important;
        text-decoration: none !important;
        font-family: 'Poppins', sans-serif !important;
        font-weight: 800 !important;
        font-size: 14px !important;
        text-transform: uppercase !important;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.5s ease, visibility 0.5s ease !important;
    }
    #ghost-back-btn.active { opacity: 1; visibility: visible; }

    /* LANDSCAPE LOCK */
    #landscape-lock {
        position: fixed !important;
        inset: 0 !important;
        background: #3E0100 !important;
        z-index: 3000 !important;
        display: none;
        flex-direction: column !important;
        justify-content: center !important;
        align-items: center !important;
        color: #FFC627 !important;
        text-align: center !important;
        font-family: 'Poppins', sans-serif !important;
    }
    @media screen and (orientation: portrait) and (max-width: 1024px) {
        #landscape-lock { display: flex !important; }
    }

    /* MAIN DISPLAY BOX - Hugs the content width */
    #sk-billboard-display {
        position: relative !important;
        width: fit-content !important; /* V3.0: Core Change - Sides come into edge */
        max-width: 100vw !important;
        height: 100vh !important;
        background: #000 !important;
        display: flex !important;
        flex-direction: column !important;
        overflow: hidden !important;
        border-left: 5px solid #1a1a1a !important;
        border-right: 5px solid #1a1a1a !important;
        box-shadow: 0 0 100px rgba(0,0,0,1) !important;
    }

    /* AD VIEWPORT - THE MAIN PART */
    #sk-ad-viewport {
        flex: 1 !important;
        width: auto !important;
        height: calc(100vh - var(--bar-height)) !important;
        z-index: 1 !important;
        background: #000 !important;
        display: flex !important;
        justify-content: center !important;
        align-items: flex-start !important;
    }

    .sk-ad-slide {
        display: none !important;
        height: 100% !important;
        width: auto !important;
    }

    .sk-ad-slide.active { display: flex !important; }

    /* V3.0: HUG THE EDGES */
    .sk-ad-slide img {
        height: 100% !important;
        width: auto !important;
        max-width: 100vw !important;
        object-fit: contain !important; 
        filter: saturate(1.1) contrast(1.05) brightness(0.95) !important;
        transition: filter 0.8s ease !important;
    }

    .dark-mode .sk-ad-slide img {
        filter: saturate(1.1) contrast(1.05) brightness(0.75) !important;
    }

    /* BAR AREA - Sized by parent width */
    #sk-bottom-bar {
        width: 100% !important;
        height: var(--bar-height) !important;
        background: var(--bb-bottom-bg) !important;
        display: flex !important;
        justify-content: space-between !important;
        align-items: center !important;
        padding: 0 40px !important;
        border-top: 4px solid #FAC429 !important; /* Gold physical divider */
        z-index: 10 !important;
        transition: all 0.4s ease !important;
    }

    .sk-logo-group { display: flex !important; align-items: baseline !important; gap: 20px !important; }

    .sk-logo {
        color: #FAC429 !important;
        font-weight: 900 !important;
        font-size: clamp(18px, 3.5vw, 40px) !important;
        letter-spacing: 3px !important;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.8) !important;
        white-space: nowrap !important;
    }

    .sk-bottom-phone {
        color: var(--bb-text) !important;
        font-weight: 900 !important;
        font-size: clamp(18px, 3.5vw, 40px) !important; 
        letter-spacing: 3px !important; 
        white-space: nowrap !important;
    }

    .sk-info-stack {
        display: flex !important;
        align-items: center !important;
        gap: 30px !important;
        color: var(--bb-text) !important;
    }

    #sk-temp-val { font-size: clamp(22px, 4vw, 44px) !important; font-weight: 900 !important; }

    #sk-time-val {
        font-size: clamp(18px, 3vw, 34px) !important;
        font-weight: 700 !important;
        font-family: 'Courier New', monospace !important;
        border-left: 3px solid var(--bb-border) !important;
        padding-left: 30px !important;
    }

    .sk-led-overlay {
        position: absolute !important;
        inset: 0 !important;
        background-image: radial-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px) !important;
        background-size: 3px 3px !important;
        box-shadow: inset 0 0 40px rgba(0,0,0,0.5) !important;
        pointer-events: none !important;
        z-index: 5 !important;
    }

    @media (max-width: 768px) {
        #sk-billboard-root-container { --bar-height: 80px; }
        #sk-bottom-bar { padding: 0 20px !important; }
        .sk-logo-group { flex-direction: column !important; gap: 0 !important; }
        .sk-info-stack { gap: 15px !important; }
        #sk-time-val { padding-left: 15px !important; }
    }
</style>

<script>
(function() {
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT9aXB9z9jcsaA0U-LsuV4nIHwIIw2huGB8zaalh7It4GQP_DWFFdQ4Utaw_ajkdhx5ydn87BcfS82d/pub?output=csv";
    const displayInterval = 12000; 
    let currentAdIndex = 0;
    let adSlideElements = [];
    let lastWeatherData = null; 
    let targetTimeZone = Intl.DateTimeFormat().resolvedOptions().timeZone; 
    let isNightTimeSolar = null; 
    let interactionTimer;

    window.handleInteraction = function() {
        const btn = document.getElementById('ghost-back-btn');
        if(!btn) return;
        btn.classList.add('active');
        clearTimeout(interactionTimer);
        interactionTimer = setTimeout(() => { btn.classList.remove('active'); }, 3000);
    }

    function syncTimeTheme() {
        const root = document.getElementById('sk-billboard-root-container');
        if (!root) return;
        let isNightTime = (isNightTimeSolar !== null) ? isNightTimeSolar : (new Date().getHours() < 6 || new Date().getHours() >= 19);
        if (isNightTime) {
            root.classList.add('dark-mode');
            root.classList.remove('light-mode');
        } else {
            root.classList.add('light-mode');
            root.classList.remove('dark-mode');
        }
        if(lastWeatherData) updateWeatherUI(lastWeatherData);
    }

    async function fetchAdImages() {
        try {
            const res = await fetch(`${CSV_URL}&t=${Date.now()}`);
            const text = await res.text();
            const lines = text.split(/\r?\n/);
            let loadedUrls = [];
            lines.forEach((line, idx) => {
                if (idx === 0) return; 
                const cellMatch = line.match(/(".*?"|[^,]+)/g);
                if (cellMatch && cellMatch[2]) {
                    let url = cellMatch[2].replace(/^"|"$|&amp;/g, '').trim();
                    if (url.startsWith('http')) loadedUrls.push(url);
                }
            });
            if (loadedUrls.length > 0) adImages = loadedUrls;
        } catch (e) {}
    }

    async function fetchWeather(lat, lon) {
        try {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,is_day&temperature_unit=fahrenheit&timezone=auto`;
            const res = await fetch(url);
            const data = await res.json();
            if (data.timezone) targetTimeZone = data.timezone;
            if (data.current.is_day !== undefined) isNightTimeSolar = (data.current.is_day === 0);
            const weatherData = { temp: Math.round(data.current.temperature_2m), realfeel: Math.round(data.current.apparent_temperature) };
            lastWeatherData = weatherData; 
            return weatherData;
        } catch(e) { return null; }
    }

    function updateWeatherUI(weather) {
        if(!weather) return;
        const tempDisplay = document.getElementById('sk-temp-val');
        const feelDisplay = document.getElementById('sk-realfeel-val');
        if(tempDisplay && feelDisplay) {
            tempDisplay.innerText = `${weather.temp}°`;
            feelDisplay.innerText = `REALFEEL ${weather.realfeel}°`;
            let tempColor = "#ffffff";
            const t = weather.temp;
            if (t <= 32) tempColor = "#00f2ff"; 
            else if (t <= 50) tempColor = "#0ea5e9"; 
            else if (t <= 75) tempColor = "#FAC429"; 
            else if (t <= 90) tempColor = "#f97316"; 
            else tempColor = "#ef4444"; 
            tempDisplay.style.color = tempColor;
            tempDisplay.style.textShadow = `1px 1px 2px rgba(0,0,0,0.8)`;
        }
    }

    function rotateAds() {
        if(adSlideElements.length === 0) return;
        adSlideElements[currentAdIndex].classList.remove('active');
        currentAdIndex = (currentAdIndex + 1) % adSlideElements.length;
        adSlideElements[currentAdIndex].classList.add('active');
    }

    function updateLocalTime() {
        const timeEl = document.getElementById('sk-time-val');
        if(!timeEl) return;
        try {
            timeEl.innerText = new Date().toLocaleTimeString('en-US', { timeZone: targetTimeZone, hour: '2-digit', minute:'2-digit', hour12: true });
        } catch (e) {
            timeEl.innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: true});
        }
    }

    async function startBillboard() {
        if (typeof lucide !== 'undefined') lucide.createIcons();
        syncTimeTheme();
        await fetchAdImages();
        const viewport = document.getElementById('sk-ad-viewport');
        if(!viewport) return;
        adImages.forEach((url, idx) => {
            const slide = document.createElement('div');
            slide.className = `sk-ad-slide ${idx === 0 ? 'active' : ''}`;
            const image = document.createElement('img');
            image.src = url;
            slide.appendChild(image);
            viewport.appendChild(slide);
            adSlideElements.push(slide);
        });
        
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
                async (p) => { updateWeatherUI(await fetchWeather(p.coords.latitude, p.coords.longitude)); syncTimeTheme(); },
                async (e) => { updateWeatherUI(await fetchWeather(39.1243, -88.5525)); syncTimeTheme(); },
                { timeout: 5000 }
            );
        } else {
            fetchWeather(39.1243, -88.5525).then(w => { updateWeatherUI(w); syncTimeTheme(); });
        }

        setTimeout(() => { updateLocalTime(); setInterval(updateLocalTime, 1000); }, 500);
        setInterval(rotateAds, displayInterval);
        setInterval(syncTimeTheme, 300000); 
    }
    if (document.readyState === "complete" || document.readyState === "interactive") startBillboard();
    else document.addEventListener("DOMContentLoaded", startBillboard);
})();
</script>
